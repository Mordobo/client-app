name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy web to Netlify
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_ENV: production
      EXPO_PUBLIC_API_ENV: production
      EXPO_PUBLIC_API_URL_PROD: https://mordobo-api-prod.onrender.com
      EXPO_PUBLIC_SUPABASE_URL: https://xxvjunhjerhlxhmarelr.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web export
        run: npm run build:web

      - name: Deploy to Netlify
        if: secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != ''
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions (${{ github.sha }})"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Netlify secrets not configured
        if: secrets.NETLIFY_AUTH_TOKEN == '' || secrets.NETLIFY_SITE_ID == ''
        run: |
          echo "::warning::Web build succeeded but Netlify deploy was skipped."
          echo "Add NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID in GitHub → Settings → Secrets."
          echo "Or trigger deploy manually in the Netlify dashboard."
