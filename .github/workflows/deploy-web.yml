name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy web to Netlify
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_ENV: production
      EXPO_PUBLIC_API_ENV: production
      EXPO_PUBLIC_API_URL_PROD: https://mordobo-api-prod.onrender.com
      EXPO_PUBLIC_SUPABASE_URL: https://xxvjunhjerhlxhmarelr.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
      # Azul merchant review: full registered address of MORDOBO EIRL
      EXPO_PUBLIC_COMPANY_ADDRESS: ${{ vars.EXPO_PUBLIC_COMPANY_ADDRESS }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static web export
        run: npm run build:web

      - name: Deploy to Netlify
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            npx --yes netlify-cli deploy --prod --dir=dist --message "Deploy from GitHub Actions (${{ github.sha }})"
          else
            echo "::warning::Web build succeeded but Netlify deploy was skipped."
            echo "Add NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID in GitHub → Settings → Secrets."
            echo "Or trigger deploy manually in the Netlify dashboard."
          fi
